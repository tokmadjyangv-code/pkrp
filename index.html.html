.header h1{font-size:16px;font-weight:800;letter-spacing:1px;color:var(--b)}
.header .sub{font-size:10px;color:var(--g);margin-top:1px;letter-spacing:.5px;text-transform:uppercase}
.sync-btn{margin-left:auto;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:0;color:var(--b);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .3s}
.sync-btn.loading{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.sync-status{font-size:8px;color:var(--g);text-align:center;padding:2px 16px;background:#1f1f1f}
.tabs{display:flex;gap:4px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:#1f1f1f}
.tabs button{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;background:var(--card);color:var(--g);transition:all .2s}
.tabs button.active{background:var(--b);color:#fff}
.quick{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:#1f1f1f}
.qc{flex:1;min-width:85px;padding:7px 8px;border-radius:10px;background:var(--card);text-align:center;border:1px solid var(--border)}
.qc .ql{font-size:8px;color:var(--g);text-transform:uppercase;letter-spacing:.8px}
.qc .qv{font-size:15px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
.ct{padding:12px 16px;max-width:600px;margin:0 auto}
.sec{margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.sec-h{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sec-h span{font-size:13px;font-weight:700}
.sec-b{padding:10px 14px;border-top:1px solid var(--border)}
.add-row{display:flex;gap:5px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
.add-row .ar-icon{font-size:13px;width:20px;text-align:center}
.add-row .ar-label{flex:1;font-size:11px;color:var(--g);min-width:60px}
.add-row input{width:90px;padding:7px 8px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--w);font-size:14px;outline:none}
.add-row input:focus{border-color:var(--b)}
.add-row input.comment{width:100%;margin:0 0 6px 25px;font-size:11px;color:var(--g);padding:5px 8px}
.add-row .ar-btn{width:34px;height:34px;border-radius:7px;border:none;cursor:pointer;background:var(--b);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center}
.add-row .ar-total{font-size:12px;font-weight:700;min-width:70px;text-align:right}
.tx-list{margin-top:6px;max-height:120px;overflow-y:auto}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:10px;color:var(--g)}
.tx-item .tx-note{color:#999;font-style:italic;margin-left:4px}
.tx-item .tx-del{cursor:pointer;color:var(--red);padding:2px 6px;font-size:12px;flex-shrink:0}
.month-sel{display:flex;gap:6px;align-items:center;margin-bottom:12px;justify-content:center}
.month-sel button{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:0;color:var(--g);cursor:pointer;font-size:16px}
.month-sel .ml{font-size:14px;font-weight:700;min-width:140px;text-align:center}
.profit-bar{padding:10px 14px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.apt-inp{flex:1;padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--b);font-size:14px;font-weight:700;outline:none}
.apt-inp:focus{border-color:var(--b)}
.rm-btn{width:32px;height:32px;border-radius:7px;border:none;cursor:pointer;background:rgba(248,113,113,.12);color:var(--red);font-size:13px}
.add-apt{width:100%;padding:11px;border-radius:10px;border:2px dashed rgba(232,97,58,.3);background:0;color:var(--b);cursor:pointer;font-size:12px;font-weight:700}
.sr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.sr .sl{font-size:11px;color:var(--g)}.sr .sv{font-size:12px;font-weight:600}
.sr.bold .sl,.sr.bold .sv{font-weight:800}
.div{height:1px;background:rgba(255,255,255,.1);margin:6px 0}
.cash-box{padding:12px;border-radius:12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.cash-box .cl{font-size:14px;font-weight:800}.cash-box .cv{font-size:22px;font-weight:900;letter-spacing:-1px}
.bar-r{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.bar-r .bi{font-size:11px;width:16px}.bar-r .bl{width:80px;font-size:10px;color:var(--g)}
.bar-r .bt{flex:1;height:12px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.bar-r .bf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--bd),var(--b))}
.bar-r .bv{font-size:10px;color:var(--b);font-weight:600;min-width:60px;text-align:right}
.p-bal{padding:8px 10px;border-radius:7px;display:flex;justify-content:space-between;margin-top:6px}
.hidden{display:none}
.save-note{text-align:center;font-size:9px;color:var(--g);padding:8px;opacity:.6}
</style>
</head>
<body>

<div class="header">
  <div class="logo"></div>
  <div><h1>PKRP</h1><div class="sub">Финансовый калькулятор • Облако</div></div>
  <button class="sync-btn" id="syncBtn" title="Синхронизировать">🔄</button>
</div>
<div class="sync-status" id="syncStatus">Загрузка...</div>
<div class="tabs" id="tabs"></div>
<div class="quick" id="quick"></div>
<div class="ct" id="ct"></div>

<script>
// ========================================
// ВСТАВЬ СЮДА URL Google Apps Script:
const API_URL = 'https://script.google.com/macros/s/AKfycbwKDP_CwrK5mfbq0yz_wnnpYpd_GFR7jMJXMh5RyM_kwEgw_ysiHhEzhqQ-sjdiv321mw/exec';
// ========================================

const B='#e8613a',G='#4ade80',R='#f87171',BL='#60a5fa',P='#a78bfa';
const MN=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

const INC=[{k:"booking",l:"Бронь",i:"📋"},{k:"payment",l:"Оплата",i:"💰"},{k:"deposit_in",l:"Депозит получен",i:"🔒"}];
const EXA=[{k:"rent",l:"Аренда",i:"🏠"},{k:"deposit",l:"Депозит за кв.",i:"🔒"},{k:"deposit_ret",l:"Возврат деп. гостю",i:"🔓"},
  {k:"equipment",l:"Оснащение",i:"🛋"},{k:"consumables",l:"Расходники",i:"🧴"},{k:"cleaning",l:"Уборка",i:"🧹"},
  {k:"laundry",l:"Стирка",i:"👕"},{k:"utilities",l:"Коммуналка",i:"💡"},{k:"ads",l:"Объявления",i:"📢"},{k:"ads_promo",l:"Реклама",i:"📣"},{k:"fine",l:"Штраф",i:"⚠️"}];
const EXM=[{k:"salary",l:"Зарплаты",i:"👤"},{k:"agency",l:"Агентские",i:"🤝"},{k:"advertising",l:"Реклама",i:"📣"},
  {k:"credit",l:"Кредит",i:"🏦"},{k:"lunch",l:"Обед",i:"🍽"},{k:"taxi",l:"Такси",i:"🚕"},
  {k:"commission",l:"Комиссия",i:"💳"},{k:"transfer",l:"Перевод",i:"↔️"},{k:"transport",l:"Транспорт",i:"🚌"},
  {k:"storage",l:"Склад",i:"📦"},{k:"charity",l:"Благотворит.",i:"❤️"},{k:"gifts",l:"Подарки",i:"🎁"},{k:"calendar",l:"Календарь",i:"📅"}];

const now=new Date();
let tab="apts",curYear=now.getFullYear(),curMonth=now.getMonth();
let collapsed={};

function mkey(y,m){return`${y}-${String(m+1).padStart(2,'0')}`;}
function curMK(){return mkey(curYear,curMonth);}
function fmt(n){const a=Math.abs(Math.round(n));return(n<0?"−":"")+a.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")+" ₽";}
function ts(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// --- CLOUD SYNC ---
let syncTimeout=null;
function setStatus(msg){document.getElementById("syncStatus").textContent=msg;}

async function cloudLoad(){
  if(API_URL==='ВСТАВЬ_СЮДА_URL'){
    setStatus('⚠️ Вставь URL Google Apps Script в код');
    return loadLocal();
  }
  try{
    document.getElementById("syncBtn").classList.add("loading");
    setStatus('Загрузка из облака...');
    const r=await fetch(API_URL);
    const d=await r.json();
    if(d&&d.apartments){
      localStorage.setItem('pkrp_data',JSON.stringify(d));
      setStatus('✅ Загружено из облака');
      document.getElementById("syncBtn").classList.remove("loading");
      return d;
    }
  }catch(e){setStatus('⚠️ Офлайн — локальные данные');}
  document.getElementById("syncBtn").classList.remove("loading");
  return loadLocal();
}

async function cloudSave(){
  saveLocal();
  if(API_URL==='ВСТАВЬ_СЮДА_URL')return;
  // Debounce: save after 1 second of no changes
  clearTimeout(syncTimeout);
  syncTimeout=setTimeout(async()=>{
    try{
      document.getElementById("syncBtn").classList.add("loading");
      setStatus('Сохранение в облако...');
      await fetch(API_URL,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'text/plain'}});
      setStatus('✅ Сохранено · '+ts());
      document.getElementById("syncBtn").classList.remove("loading");
    }catch(e){
      setStatus('⚠️ Ошибка сохранения — данные локально');
      document.getElementById("syncBtn").classList.remove("loading");
    }
  },1000);
}

function loadLocal(){
  try{return JSON.parse(localStorage.getItem('pkrp_data'))||defaultData();}
  catch(e){return defaultData();}
}
function saveLocal(){localStorage.setItem('pkrp_data',JSON.stringify(data));}

function defaultData(){
  return{apartments:[{id:uid(),name:"Квартира 1"},{id:uid(),name:"Квартира 2"},{id:uid(),name:"Квартира 3"}],
    transactions:[],partners:{rafTook:[],rafRet:[],karenTook:[],karenRet:[]},dividends:[]};
}

let data=defaultData();

// --- DATA HELPERS ---
function txsForMonth(mk){return data.transactions.filter(t=>t.month===mk);}
function partnerForMonth(mk,key){return(data.partners[key]||[]).filter(t=>t.month===mk);}
function divForMonth(mk){return(data.dividends||[]).filter(t=>t.month===mk);}
function sumArr(arr){return arr.reduce((s,t)=>s+t.amount,0);}
function aptIncome(aptId,mk){return txsForMonth(mk).filter(t=>t.aptId===aptId&&t.type==='income');}
function aptExpense(aptId,mk){return txsForMonth(mk).filter(t=>t.aptId===aptId&&t.type==='expense');}
function mgrExpense(mk){return txsForMonth(mk).filter(t=>t.type==='mgr_expense');}

function calcMonth(mk){
  let tInc=0,tExpA=0;
  const det=data.apartments.map(a=>{const i=sumArr(aptIncome(a.id,mk)),e=sumArr(aptExpense(a.id,mk));tInc+=i;tExpA+=e;return{id:a.id,name:a.name,income:i,expenses:e,profit:i-e};});
  const tExpM=sumArr(mgrExpense(mk)),tExp=tExpA+tExpM,divs=sumArr(divForMonth(mk)),gross=tInc-tExp,net=gross-divs;
  const rT=sumArr(partnerForMonth(mk,'rafTook')),rR=sumArr(partnerForMonth(mk,'rafRet'));
  const kT=sumArr(partnerForMonth(mk,'karenTook')),kR=sumArr(partnerForMonth(mk,'karenRet'));
  return{det,tInc,tExpA,tExpM,tExp,gross,divs,net,rT,rR,rBal:rT-rR,kT,kR,kBal:kT-kR,cash:net-(rT-rR)-(kT-kR)};
}

function getCatTotal(prefix,catKey,aptId){
  const mk=curMK();
  if(prefix==='inc')return sumArr(aptIncome(aptId,mk).filter(t=>t.cat===catKey));
  if(prefix==='exp')return sumArr(aptExpense(aptId,mk).filter(t=>t.cat===catKey));
  if(prefix==='mgr')return sumArr(mgrExpense(mk).filter(t=>t.cat===catKey));
  return 0;
}

// --- RENDER ---
function renderTabs(){
  const tt=[{id:"apts",l:"🏠 Квартиры"},{id:"mgr",l:"📊 Управление"},{id:"partners",l:"👥 Партнёры"},{id:"analytics",l:"📈 Аналитика"},{id:"history",l:"📅 Месяцы"}];
  document.getElementById("tabs").innerHTML=tt.map(t=>`<button class="${tab===t.id?'active':''}" data-tab="${t.id}">${t.l}</button>`).join('');
}

function renderQuick(){
  const a=calcMonth(curMK());
  const items=[{l:"Доход",v:a.tInc,c:G},{l:"Расход",v:a.tExp,c:R},{l:"Касса",v:a.cash,c:a.cash>=0?B:R}];
  document.getElementById("quick").innerHTML=items.map(s=>`<div class="qc"><div class="ql">${s.l}</div><div class="qv" style="color:${s.c}">${fmt(s.v)}</div></div>`).join('');
}

function monthNav(){return`<div class="month-sel"><button data-mnav="prev">‹</button><div class="ml">${MN[curMonth]} ${curYear}</div><button data-mnav="next">›</button></div>`;}

function addRowHTML(cat,prefix,aptId){
  const da=aptId?`data-apt="${aptId}"`:''
  return`<div class="add-row">
    <span class="ar-icon">${cat.i}</span><span class="ar-label">${cat.l}</span>
    <input type="number" inputmode="numeric" placeholder="0" data-input="${prefix}_${cat.k}" ${da}>
    <button class="ar-btn" data-add="${prefix}_${cat.k}" ${da}>+</button>
    <span class="ar-total">${fmt(getCatTotal(prefix,cat.k,aptId))}</span>
    <input class="comment" type="text" placeholder="Комментарий..." data-comment="${prefix}_${cat.k}" ${da}>
  </div>`;
}

function txListHTML(txs,limit){
  const sorted=txs.slice().sort((a,b)=>b.ts-a.ts).slice(0,limit||20);
  if(!sorted.length)return'';
  return`<div class="tx-list">${sorted.map(t=>`<div class="tx-item"><span>${t.time} · ${t.label}${t.note?`<span class="tx-note"> — ${t.note}</span>`:''}</span><span>${fmt(t.amount)} <span class="tx-del" data-del="${t.id}">✕</span></span></div>`).join('')}</div>`;
}

function secHTML(id,title,accent,body){
  const c=collapsed[id];
  return`<div class="sec"><div class="sec-h" data-toggle="${id}"><span style="color:${accent}">${title}</span><span style="color:#555;font-size:11px">${c?'▶':'▼'}</span></div>${c?'':`<div class="sec-b">${body}</div>`}</div>`;
}

function renderContent(){
  const mk=curMK(),a=calcMonth(mk);let h=monthNav();

  if(tab==="apts"){
    data.apartments.forEach((apt)=>{
      h+=`<div style="margin-bottom:14px">`;
      h+=`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px"><input class="apt-inp" value="${apt.name}" data-aptname="${apt.id}">${data.apartments.length>1?`<button class="rm-btn" data-remove="${apt.id}">✕</button>`:''}</div>`;
      const incT=sumArr(aptIncome(apt.id,mk));let incB='';
      INC.forEach(c=>{incB+=addRowHTML(c,'inc',apt.id);});
      incB+=txListHTML(aptIncome(apt.id,mk).map(t=>({...t,label:INC.find(c=>c.k===t.cat)?.l||t.cat,note:t.note||''})));
      h+=secHTML(`inc_${apt.id}`,`💰 Доходы • ${fmt(incT)}`,G,incB);
      const expT=sumArr(aptExpense(apt.id,mk));let expB='';
      EXA.forEach(c=>{expB+=addRowHTML(c,'exp',apt.id);});
      expB+=txListHTML(aptExpense(apt.id,mk).map(t=>({...t,label:EXA.find(c=>c.k===t.cat)?.l||t.cat,note:t.note||''})));
      h+=secHTML(`exp_${apt.id}`,`📉 Расходы • ${fmt(expT)}`,R,expB);
      const p=incT-expT;
      h+=`<div class="profit-bar" style="background:${p>=0?'rgba(74,222,128,.08)':'rgba(248,113,113,.08)'};border:1px solid ${p>=0?'rgba(74,222,128,.2)':'rgba(248,113,113,.2)'}"><span style="font-size:12px;font-weight:700">Прибыль</span><span style="font-size:16px;font-weight:900;color:${p>=0?G:R}">${fmt(p)}</span></div></div>`;
    });
    h+=`<button class="add-apt" data-action="addapt">+ Добавить квартиру</button>`;
  }

  if(tab==="mgr"){
    const mT=sumArr(mgrExpense(mk));let mB='';
    EXM.forEach(c=>{mB+=addRowHTML(c,'mgr');});
    mB+=txListHTML(mgrExpense(mk).map(t=>({...t,label:EXM.find(c=>c.k===t.cat)?.l||t.cat,note:t.note||''})));
    h+=secHTML("mgrSec",`🏢 Расходы управления • ${fmt(mT)}`,R,mB);
    const dT=sumArr(divForMonth(mk));
    let dB=`<div class="add-row"><span class="ar-icon">💎</span><span class="ar-label">Сумма</span>
      <input type="number" inputmode="numeric" placeholder="0" data-input="div_amount">
      <button class="ar-btn" data-add="div_amount">+</button>
      <span class="ar-total">${fmt(dT)}</span>
      <input class="comment" type="text" placeholder="Комментарий..." data-comment="div_amount">
    </div>`;
    dB+=txListHTML(divForMonth(mk).map(t=>({...t,label:"Дивиденды",note:t.note||''})));
    h+=secHTML("divSec",`💎 Дивиденды • ${fmt(dT)}`,P,dB);
  }

  if(tab==="partners"){
    ['raf','karen'].forEach(who=>{
      const nm=who==='raf'?'Раф':'Карен',col=who==='raf'?BL:'#f472b6';
      const took=sumArr(partnerForMonth(mk,who+'Took')),ret=sumArr(partnerForMonth(mk,who+'Ret')),bal=took-ret;
      let body=`<div class="add-row"><span class="ar-icon">📤</span><span class="ar-label">Взял из кассы</span>
        <input type="number" inputmode="numeric" placeholder="0" data-input="p_${who}Took">
        <button class="ar-btn" data-add="p_${who}Took">+</button>
        <span class="ar-total">${fmt(took)}</span>
        <input class="comment" type="text" placeholder="Комментарий..." data-comment="p_${who}Took">
      </div>`;
      body+=`<div class="add-row"><span class="ar-icon">📥</span><span class="ar-label">Вернул в кассу</span>
        <input type="number" inputmode="numeric" placeholder="0" data-input="p_${who}Ret">
        <button class="ar-btn" data-add="p_${who}Ret">+</button>
        <span class="ar-total">${fmt(ret)}</span>
        <input class="comment" type="text" placeholder="Комментарий..." data-comment="p_${who}Ret">
      </div>`;
      body+=`<div class="p-bal" style="background:${bal>0?'rgba(248,113,113,.08)':'rgba(74,222,128,.08)'}"><span style="font-size:11px;color:var(--g)">Баланс</span><span style="font-size:14px;font-weight:800;color:${bal>0?R:G}">${fmt(bal)}</span></div>`;
      const allTx=[...partnerForMonth(mk,who+'Took').map(t=>({...t,label:'Взял',note:t.note||''})),...partnerForMonth(mk,who+'Ret').map(t=>({...t,label:'Вернул',note:t.note||''}))];
      body+=txListHTML(allTx);
      h+=secHTML(`p_${who}`,`👤 ${nm} • баланс: ${fmt(bal)}`,col,body);
    });
  }

  if(tab==="analytics"){
    const sr=(l,v,c,b)=>`<div class="sr ${b?'bold':''}"><span class="sl">${l}</span><span class="sv" style="color:${c||'#e5e5e5'}">${fmt(v)}</span></div>`;
    let detB='';
    a.det.forEach(d=>{
      detB+=`<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:700;margin-bottom:3px">${d.name}</div>
      <div style="display:flex;gap:5px">
        <div style="flex:1;padding:5px 6px;border-radius:6px;background:rgba(74,222,128,.06);text-align:center"><div style="font-size:7px;color:var(--g)">ДОХОД</div><div style="font-size:11px;font-weight:700;color:${G}">${fmt(d.income)}</div></div>
        <div style="flex:1;padding:5px 6px;border-radius:6px;background:rgba(248,113,113,.06);text-align:center"><div style="font-size:7px;color:var(--g)">РАСХОД</div><div style="font-size:11px;font-weight:700;color:${R}">${fmt(d.expenses)}</div></div>
        <div style="flex:1;padding:5px 6px;border-radius:6px;background:${d.profit>=0?'rgba(232,97,58,.06)':'rgba(248,113,113,.06)'};text-align:center"><div style="font-size:7px;color:var(--g)">ПРИБЫЛЬ</div><div style="font-size:11px;font-weight:700;color:${d.profit>=0?B:R}">${fmt(d.profit)}</div></div>
      </div></div>`;
    });
    h+=secHTML("aptDet","🏠 По квартирам",B,detB);
    let sB='';sB+=sr("Доходы квартир",a.tInc,G);sB+=sr("Расходы квартир",a.tExpA,R);sB+=sr("Расходы управления",a.tExpM,R);
    sB+=`<div class="div"></div>`;sB+=sr("ИТОГО расходы",a.tExp,R,1);sB+=sr("Валовая прибыль",a.gross,a.gross>=0?G:R,1);
    sB+=sr("Дивиденды",a.divs,P);sB+=sr("Чистая прибыль",a.net,a.net>=0?G:R,1);
    h+=secHTML("sumSec","📊 Сводка",G,sB);
    let cB='';cB+=sr("Чистая прибыль",a.net,a.net>=0?G:R);cB+=sr("Раф взял",a.rT,R);cB+=sr("Раф вернул",a.rR,G);
    cB+=sr("Карен взял",a.kT,R);cB+=sr("Карен вернул",a.kR,G);cB+=`<div class="div"></div>`;
    cB+=`<div class="cash-box" style="background:${a.cash>=0?'rgba(232,97,58,.12)':'rgba(248,113,113,.12)'};border:1px solid ${a.cash>=0?'rgba(232,97,58,.3)':'rgba(248,113,113,.3)'}"><span class="cl">КАССА ИТОГ</span><span class="cv" style="color:${a.cash>=0?B:R}">${fmt(a.cash)}</span></div>`;
    h+=secHTML("cashSec","💼 Касса",B,cB);
  }

  if(tab==="history"){
    h+=`<div style="font-size:12px;color:var(--g);margin-bottom:12px;text-align:center">Итоги по месяцам</div>`;
    for(let i=0;i<12;i++){let y=curYear,m=curMonth-i;while(m<0){m+=12;y--;}
      const mk=mkey(y,m),c=calcMonth(mk);if(c.tInc===0&&c.tExp===0)continue;
      h+=`<div class="sec" style="margin-bottom:8px"><div style="padding:10px 14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:14px;font-weight:800">${MN[m]} ${y}</span>
          <span style="font-size:14px;font-weight:900;color:${c.cash>=0?B:R}">${fmt(c.cash)}</span></div>
        <div style="display:flex;gap:8px;font-size:10px">
          <span style="color:${G}">Доход: ${fmt(c.tInc)}</span><span style="color:${R}">Расход: ${fmt(c.tExp)}</span><span style="color:${P}">Дивид: ${fmt(c.divs)}</span>
        </div></div></div>`;
    }
  }

  h+=`<div class="save-note">Данные синхронизируются через Google Sheets</div>`;
  document.getElementById("ct").innerHTML=h;
}

function render(){renderTabs();renderQuick();renderContent();}

// --- EVENTS ---
document.addEventListener("click",e=>{
  const tabBtn=e.target.closest("[data-tab]");if(tabBtn){tab=tabBtn.dataset.tab;render();return;}
  const tog=e.target.closest("[data-toggle]");if(tog){collapsed[tog.dataset.toggle]=!collapsed[tog.dataset.toggle];render();return;}
  const nav=e.target.closest("[data-mnav]");
  if(nav){if(nav.dataset.mnav==='prev'){curMonth--;if(curMonth<0){curMonth=11;curYear--;}}else{curMonth++;if(curMonth>11){curMonth=0;curYear++;}}render();return;}
  const rem=e.target.closest("[data-remove]");if(rem){data.apartments=data.apartments.filter(a=>a.id!==rem.dataset.remove);cloudSave();render();return;}
  if(e.target.closest("[data-action='addapt']")){data.apartments.push({id:uid(),name:`Квартира ${data.apartments.length+1}`});cloudSave();render();return;}
  const del=e.target.closest("[data-del]");
  if(del){const id=del.dataset.del;
    data.transactions=data.transactions.filter(t=>t.id!==id);
    ['rafTook','rafRet','karenTook','karenRet'].forEach(k=>{data.partners[k]=data.partners[k].filter(t=>t.id!==id);});
    data.dividends=data.dividends.filter(t=>t.id!==id);cloudSave();render();return;}
  const addBtn=e.target.closest("[data-add]");
  if(addBtn){
    const key=addBtn.dataset.add,aptId=addBtn.dataset.apt||null;
    const row=addBtn.closest('.add-row');
    const inp=row.querySelector('input[type="number"]');
    const commentInp=row.querySelector('.comment');
    const val=Number(inp?.value)||0;if(!val)return;
    const note=(commentInp?.value||'').trim();
    const mk=curMK(),t={id:uid(),month:mk,ts:Date.now(),time:ts(),amount:val,note};
    if(key.startsWith('inc_')){t.type='income';t.cat=key.replace('inc_','');t.aptId=aptId;data.transactions.push(t);}
    else if(key.startsWith('exp_')){t.type='expense';t.cat=key.replace('exp_','');t.aptId=aptId;data.transactions.push(t);}
    else if(key.startsWith('mgr_')){t.type='mgr_expense';t.cat=key.replace('mgr_','');data.transactions.push(t);}
    else if(key==='div_amount'){data.dividends.push(t);}
    else if(key.startsWith('p_')){data.partners[key.replace('p_','')].push(t);}
    cloudSave();if(inp)inp.value='';if(commentInp)commentInp.value='';render();return;
  }
});

document.addEventListener("input",e=>{
  if(e.target.dataset.aptname!==undefined){
    const apt=data.apartments.find(a=>a.id===e.target.dataset.aptname);
    if(apt){apt.name=e.target.value;cloudSave();}
  }
});

// Sync button
document.getElementById("syncBtn").onclick=async()=>{data=await cloudLoad();render();};

// --- INIT ---
(async()=>{data=await cloudLoad();render();})();
</script>
</body>
</html>
