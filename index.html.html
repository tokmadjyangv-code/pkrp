.header h1{font-size:16px;font-weight:800;letter-spacing:1px;color:var(--b)}
.header .sub{font-size:10px;color:var(--g);margin-top:1px;text-transform:uppercase}
.sync-btn{margin-left:auto;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:0;color:var(--b);cursor:pointer;font-size:18px}
.sync-status{font-size:8px;color:var(--g);text-align:center;padding:2px 16px;background:#1f1f1f}
.tabs{display:flex;gap:3px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);background:#1f1f1f}
.tabs button{padding:6px 10px;border-radius:7px;border:none;cursor:pointer;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;background:var(--card);color:var(--g)}
.tabs button.active{background:var(--b);color:#fff}
.qbar{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;background:#1f1f1f}
.qc{flex:1;min-width:80px;padding:6px 8px;border-radius:8px;background:var(--card);text-align:center;border:1px solid var(--border)}
.qc .ql{font-size:7px;color:var(--g);text-transform:uppercase;letter-spacing:.6px}
.qc .qv{font-size:14px;font-weight:800;letter-spacing:-.5px;margin-top:1px}
.ct{padding:10px 14px;max-width:640px;margin:0 auto}
.sec{margin-bottom:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.sec-h{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sec-h span{font-size:12px;font-weight:700}
.sec-b{padding:8px 12px;border-top:1px solid var(--border)}
.ar{display:flex;gap:4px;align-items:center;margin-bottom:3px;flex-wrap:wrap}
.ar .ai{font-size:12px;width:18px;text-align:center}
.ar .al{flex:1;font-size:10px;color:var(--g);min-width:50px}
.ar input[type=number]{width:80px;padding:6px 7px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--w);font-size:13px;outline:none}
.ar input:focus{border-color:var(--b)}
.ar input.cm{width:100%;margin:0 0 4px 22px;font-size:10px;color:var(--g);padding:4px 7px}
.ar .ab{width:30px;height:30px;border-radius:6px;border:none;cursor:pointer;background:var(--b);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ar .at{font-size:11px;font-weight:700;min-width:60px;text-align:right}
.txl{margin-top:4px;max-height:100px;overflow-y:auto}
.txi{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:9px;color:var(--g)}
.txi .tn{color:#777;font-style:italic;margin-left:3px}
.txi .td{cursor:pointer;color:var(--red);padding:1px 4px;font-size:10px;flex-shrink:0}
.mn{display:flex;gap:5px;align-items:center;margin-bottom:10px;justify-content:center}
.mn button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:0;color:var(--g);cursor:pointer;font-size:15px}
.mn .ml{font-size:13px;font-weight:700;min-width:130px;text-align:center}
.pb{padding:8px 12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin:4px 0}
.apt-i{flex:1;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--b);font-size:13px;font-weight:700;outline:none}
.rm{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;background:rgba(248,113,113,.12);color:var(--red);font-size:12px}
.addb{width:100%;padding:10px;border-radius:8px;border:2px dashed rgba(232,97,58,.3);background:0;color:var(--b);cursor:pointer;font-size:11px;font-weight:700}
.sr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)}.sr .sl{font-size:10px;color:var(--g)}.sr .sv{font-size:11px;font-weight:600}.sr.b .sl,.sr.b .sv{font-weight:800}
.dv{height:1px;background:rgba(255,255,255,.1);margin:5px 0}
.cb{padding:10px;border-radius:10px;margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.cb .cl{font-size:13px;font-weight:800}.cb .cv{font-size:20px;font-weight:900;letter-spacing:-1px}
.hidden{display:none}
.sn{text-align:center;font-size:8px;color:var(--g);padding:6px;opacity:.5}
/* Login */
.login-overlay{position:fixed;inset:0;background:#1a1a1a;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
.login-overlay h2{color:var(--b);font-size:20px}
.login-overlay input{width:220px;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--w);font-size:16px;text-align:center;outline:none}
.login-overlay button{padding:12px 40px;border-radius:10px;border:none;background:var(--b);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.login-overlay .err{color:var(--red);font-size:12px}
/* Staff table */
.staff-row{display:flex;gap:4px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.staff-row input{padding:5px 6px;border-radius:5px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--w);font-size:12px;outline:none}
.staff-row input:focus{border-color:var(--b)}
.staff-row .sn2{width:80px}.staff-row .sv2{width:60px}
.credit-row{padding:8px 0;border-bottom:1px solid var(--border)}
.credit-row .cr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.credit-row .cr-bank{font-size:12px;font-weight:700;color:var(--w)}
.credit-row .cr-amount{font-size:12px;font-weight:700;color:var(--red)}
.credit-row .cr-det{font-size:9px;color:var(--g)}
</style>
</head>
<body>

<div class="login-overlay" id="loginScreen">
  <div class="logo" style="width:60px;height:60px;border-radius:12px"></div>
  <h2>PKRP</h2>
  <input type="password" id="passInput" placeholder="Пароль" autofocus>
  <button id="loginBtn">Войти</button>
  <div class="err" id="loginErr"></div>
</div>

<div style="display:none" id="app">
<div class="header">
  <div class="logo"></div>
  <div><h1>PKRP</h1><div class="sub">v2 • Облако</div></div>
  <button class="sync-btn" id="syncBtn">🔄</button>
</div>
<div class="sync-status" id="syncStatus">...</div>
<div class="tabs" id="tabs"></div>
<div class="qbar" id="qbar"></div>
<div class="ct" id="ct"></div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbwKDP_CwrK5mfbq0yz_wnnpYpd_GFR7jMJXMh5RyM_kwEgw_ysiHhEzhqQ-sjdiv321mw/exec';
const PASS='pkrp2026';
const B='#e8613a',G='#4ade80',R='#f87171',BL='#60a5fa',P='#a78bfa';
const MN=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

// --- LOGIN ---
function tryLogin(){
  const v=document.getElementById('passInput').value.trim();
  if(v===PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  } else {
    document.getElementById('loginErr').textContent='Неверный пароль ('+v.length+' симв.)';
  }
}
document.getElementById('loginBtn').onclick=tryLogin;
document.getElementById('passInput').onkeydown=e=>{if(e.key==='Enter')tryLogin();};

const INC=[{k:"booking",l:"Бронь",i:"📋"},{k:"payment",l:"Оплата",i:"💰"},{k:"deposit_in",l:"Депозит получен",i:"🔒"}];
const EXA=[{k:"rent",l:"Аренда",i:"🏠"},{k:"deposit",l:"Депозит",i:"🔒"},{k:"deposit_ret",l:"Возврат деп.",i:"🔓"},
  {k:"equipment",l:"Оснащение",i:"🛋"},{k:"consumables",l:"Расходники",i:"🧴"},{k:"cleaning",l:"Уборка",i:"🧹"},
  {k:"laundry",l:"Стирка",i:"👕"},{k:"utilities",l:"Коммуналка",i:"💡"},{k:"ads",l:"Объявления",i:"📢"},{k:"ads_promo",l:"Реклама",i:"📣"},{k:"fine",l:"Штраф",i:"⚠️"}];
const EXM=[{k:"salary",l:"Зарплаты",i:"👤"},{k:"agency",l:"Агентские",i:"🤝"},{k:"advertising",l:"Реклама",i:"📣"},
  {k:"credit",l:"Кредит",i:"🏦"},{k:"lunch",l:"Обед",i:"🍽"},{k:"taxi",l:"Такси",i:"🚕"},
  {k:"commission",l:"Комиссия",i:"💳"},{k:"transfer",l:"Перевод",i:"↔️"},{k:"transport",l:"Транспорт",i:"🚌"},
  {k:"storage",l:"Склад",i:"📦"},{k:"charity",l:"Благотворит.",i:"❤️"},{k:"gifts",l:"Подарки",i:"🎁"},{k:"calendar",l:"Календарь",i:"📅"}];

const now=new Date();let tab="apts",cY=now.getFullYear(),cM=now.getMonth(),col={};

function mk(y,m){return`${y}-${String(m+1).padStart(2,'0')}`;}
function cm(){return mk(cY,cM);}
function fmt(n){const a=Math.abs(Math.round(n));return(n<0?"−":"")+a.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")+" ₽";}
function ts(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// --- DATA ---
function defaultData(){return{
  apartments:[{id:uid(),name:"К1"},{id:uid(),name:"К2"},{id:uid(),name:"К3"}],
  transactions:[],
  partners:{rafTook:[],rafRet:[],karenTook:[],karenRet:[]},
  dividends:[],
  staff:[
    {id:uid(),name:"Марина",salary:0,bonus:0,transport:0},
    {id:uid(),name:"Баха",salary:0,bonus:0,transport:0},
    {id:uid(),name:"Роман",salary:0,bonus:0,transport:0},
    {id:uid(),name:"Яна",salary:0,bonus:0,transport:0},
  ],
  credits:[
    {id:uid(),bank:"Сбербанк",amount:350000,payment:8025,balance:89015,holder:"Ани",date:"25"},
    {id:uid(),bank:"Сбербанк",amount:150000,payment:3675,balance:60688,holder:"Ани",date:"02"},
    {id:uid(),bank:"Сбербанк",amount:200000,payment:7344,balance:85955,holder:"Ани",date:"13"},
    {id:uid(),bank:"ОТП",amount:250000,payment:7340,balance:100865,holder:"Ани",date:"13"},
    {id:uid(),bank:"Альфа",amount:1500000,payment:39100,balance:1290240,holder:"Карен",date:"18"},
    {id:uid(),bank:"Альфа",amount:1000000,payment:33900,balance:1322100,holder:"Карен",date:"13"},
    {id:uid(),bank:"Сбербанк",amount:150000,payment:4662,balance:103385,holder:"Карен",date:"15"},
    {id:uid(),bank:"Альфа",amount:75000,payment:5208,balance:124808,holder:"Карен",date:"13"},
    {id:uid(),bank:"Тбанк",amount:799000,payment:43600,balance:1090436,holder:"Карен",date:"04"},
    {id:uid(),bank:"Чах",amount:1450000,payment:0,balance:660000,holder:"-",date:"26"},
    {id:uid(),bank:"Сбербанк",amount:800000,payment:28342,balance:1502129,holder:"Ани",date:"16"},
    {id:uid(),bank:"Hovo",amount:2000000,payment:50000,balance:2600000,holder:"-",date:"25"},
  ],
  log:[]
};}

let data=defaultData();
function loadL(){try{return JSON.parse(localStorage.getItem('pkrp2'))||defaultData();}catch(e){return defaultData();}}
function saveL(){localStorage.setItem('pkrp2',JSON.stringify(data));}

let syncT=null;
function ss(m){document.getElementById('syncStatus').textContent=m;}
async function cloudLoad(){
  try{ss('Загрузка...');const r=await fetch(API_URL);const d=await r.json();
    if(d&&d.apartments){localStorage.setItem('pkrp2',JSON.stringify(d));ss('✅ Облако');return d;}
  }catch(e){ss('⚠️ Офлайн');}return loadL();
}
async function cloudSave(){
  saveL();clearTimeout(syncT);
  syncT=setTimeout(async()=>{try{ss('💾...');
    await fetch(API_URL,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'text/plain'}});
    ss('✅ '+ts());}catch(e){ss('⚠️ Локально');}},1500);
}

function addLog(action){
  if(!data.log)data.log=[];
  data.log.unshift({time:ts(),action,id:uid()});
  if(data.log.length>5000)data.log.length=5000;
}

// --- CALC ---
function txM(mk){return data.transactions.filter(t=>t.month===mk);}
function pM(mk,k){return(data.partners[k]||[]).filter(t=>t.month===mk);}
function dM(mk){return(data.dividends||[]).filter(t=>t.month===mk);}
function sa(a){return a.reduce((s,t)=>s+t.amount,0);}
function aI(id,mk){return txM(mk).filter(t=>t.aptId===id&&t.type==='income');}
function aE(id,mk){return txM(mk).filter(t=>t.aptId===id&&t.type==='expense');}
function mE(mk){return txM(mk).filter(t=>t.type==='mgr_expense');}
// Client-based income per apartment
function clForApt(aptId,mk){return(data.clients||[]).filter(c=>c.aptId===aptId&&c.month===mk);}
function clIncome(aptId,mk){return clForApt(aptId,mk).reduce((s,c)=>s+(c.booking||0)+(c.payment||0),0);}
function clDeposit(aptId,mk){return clForApt(aptId,mk).reduce((s,c)=>s+(c.deposit||0),0);}
function clFine(aptId,mk){return clForApt(aptId,mk).reduce((s,c)=>s+(c.fine||0),0);}

function calcM(mk){
  let tI=0,tEA=0;
  const det=data.apartments.map(a=>{
    const i=clIncome(a.id,mk)+clDeposit(a.id,mk)+clFine(a.id,mk);
    const e=sa(aE(a.id,mk));tI+=i;tEA+=e;
    return{id:a.id,name:a.name,income:i,expenses:e,profit:i-e};
  });
  const tEM=sa(mE(mk)),tE=tEA+tEM,divs=sa(dM(mk)),gross=tI-tE,net=gross-divs;
  const rT=sa(pM(mk,'rafTook')),rR=sa(pM(mk,'rafRet')),kT=sa(pM(mk,'karenTook')),kR=sa(pM(mk,'karenRet'));
  return{det,tI,tEA,tEM,tE,gross,divs,net,rT,rR,rBal:rT-rR,kT,kR,kBal:kT-kR,cash:net-(rT-rR)-(kT-kR)};
}

function gCT(p,k,id){const mk=cm();
  if(p==='inc')return sa(aI(id,mk).filter(t=>t.cat===k));
  if(p==='exp')return sa(aE(id,mk).filter(t=>t.cat===k));
  if(p==='mgr')return sa(mE(mk).filter(t=>t.cat===k));return 0;}

// --- RENDER ---
function rTabs(){
  const tt=[{id:"apts",l:"🏠Квартиры"},{id:"mgr",l:"📊Управл."},{id:"staff",l:"👤Кадры"},{id:"credits",l:"🏦Кредиты"},{id:"partners",l:"👥Партнёры"},{id:"clients",l:"📒Клиенты"},{id:"analytics",l:"📈Итоги"},{id:"log",l:"📋Лог"},{id:"months",l:"📅Месяцы"}];
  document.getElementById("tabs").innerHTML=tt.map(t=>`<button class="${tab===t.id?'active':''}" data-tab="${t.id}">${t.l}</button>`).join('');
}

function rQ(){
  const a=calcM(cm());
  const items=[{l:"Доход",v:a.tI,c:G},{l:"Расход",v:a.tE,c:R},{l:"Касса",v:a.cash,c:a.cash>=0?B:R}];
  document.getElementById("qbar").innerHTML=items.map(s=>`<div class="qc"><div class="ql">${s.l}</div><div class="qv" style="color:${s.c}">${fmt(s.v)}</div></div>`).join('');
}

function mnH(){return`<div class="mn"><button data-mnav="prev">‹</button><div class="ml">${MN[cM]} ${cY}</div><button data-mnav="next">›</button></div>`;}

function arH(cat,pfx,aid){
  const da=aid?`data-apt="${aid}"`:'';
  return`<div class="ar"><span class="ai">${cat.i}</span><span class="al">${cat.l}</span>
    <input type="number" inputmode="numeric" placeholder="0" data-input="${pfx}_${cat.k}" ${da}>
    <button class="ab" data-add="${pfx}_${cat.k}" ${da}>+</button>
    <span class="at">${fmt(gCT(pfx,cat.k,aid))}</span>
    <input class="cm" type="text" placeholder="Комментарий..." data-comment="${pfx}_${cat.k}" ${da}>
  </div>`;
}

function txlH(txs){
  const s=txs.slice().sort((a,b)=>b.ts-a.ts).slice(0,30);
  if(!s.length)return'';
  return`<div class="txl">${s.map(t=>`<div class="txi"><span>${t.time}·${t.label||''}${t.note?`<span class="tn">—${t.note}</span>`:''}</span><span>${fmt(t.amount)}<span class="td" data-del="${t.id}">✕</span></span></div>`).join('')}</div>`;
}

function secH(id,title,accent,body){
  if(col[id]===undefined)col[id]=id.startsWith('i_')?false:true;// income open, rest collapsed
  const c=col[id];
  return`<div class="sec"><div class="sec-h" data-toggle="${id}"><span style="color:${accent}">${title}</span><span style="color:#555;font-size:10px">${c?'▶':'▼'}</span></div>${c?'':`<div class="sec-b">${body}</div>`}</div>`;
}

let clQ='';
function rC(){
  const mk=cm(),a=calcM(mk);let h=mnH();

  if(tab==="apts"){
    data.apartments.forEach(apt=>{
      h+=`<div style="margin-bottom:12px">`;
      h+=`<div style="display:flex;gap:5px;align-items:center;margin-bottom:5px"><input class="apt-i" value="${apt.name}" data-aptname="${apt.id}">${data.apartments.length>1?`<button class="rm" data-remove="${apt.id}">✕</button>`:''}</div>`;
      // === INCOME: clients inline ===
      const aptClients=clForApt(apt.id,mk);
      const iT=aptClients.reduce((s,c)=>s+(c.booking||0)+(c.payment||0)+(c.deposit||0)+(c.fine||0),0);
      let iB='';
      aptClients.forEach(c=>{
        const idx=(data.clients||[]).indexOf(c);
        const cTotal=(c.booking||0)+(c.payment||0)+(c.deposit||0)+(c.fine||0);
        iB+=`<div style="padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;gap:3px;align-items:center;margin-bottom:3px">
            <span style="font-size:11px">👤</span>
            <input style="flex:1;padding:3px 5px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--w);font-size:11px;font-weight:700;outline:none" value="${c.name||''}" data-clname="${idx}" placeholder="Имя">
            <input style="width:80px;padding:3px 5px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--blue);font-size:10px;outline:none" value="${c.phone||''}" data-clphone="${idx}" placeholder="Телефон">
            <input style="width:70px;padding:3px 5px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--g);font-size:10px;outline:none" value="${c.dates||''}" data-cldates="${idx}" placeholder="01-05.03">
            <span style="font-size:11px;font-weight:800;color:${G};min-width:50px;text-align:right">${fmt(cTotal)}</span>
            <button class="rm" data-rmclient="${idx}" style="width:20px;height:20px;font-size:8px">✕</button>
          </div>
          <div style="display:flex;gap:3px;margin-bottom:2px">
            <div style="flex:1;text-align:center"><div style="font-size:6px;color:var(--g)">📋БРОНЬ</div>
              <input type="number" inputmode="numeric" style="width:100%;padding:2px 3px;border-radius:3px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:${G};font-size:10px;font-weight:600;outline:none;text-align:center" value="${c.booking||''}" data-clbooking="${idx}" placeholder="0">
            </div>
            <div style="flex:1;text-align:center"><div style="font-size:6px;color:var(--g)">💰ОПЛАТА</div>
              <input type="number" inputmode="numeric" style="width:100%;padding:2px 3px;border-radius:3px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:${G};font-size:10px;font-weight:600;outline:none;text-align:center" value="${c.payment||''}" data-clpayment="${idx}" placeholder="0">
            </div>
            <div style="flex:1;text-align:center"><div style="font-size:6px;color:var(--g)">🔒ДЕПОЗИТ</div>
              <input type="number" inputmode="numeric" style="width:100%;padding:2px 3px;border-radius:3px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--purple);font-size:10px;font-weight:600;outline:none;text-align:center" value="${c.deposit||''}" data-cldeposit="${idx}" placeholder="0">
            </div>
            <div style="flex:1;text-align:center"><div style="font-size:6px;color:var(--g)">⚠️ШТРАФ</div>
              <input type="number" inputmode="numeric" style="width:100%;padding:2px 3px;border-radius:3px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:${R};font-size:10px;font-weight:600;outline:none;text-align:center" value="${c.fine||''}" data-clfine="${idx}" placeholder="0">
            </div>
          </div>
          <input style="width:100%;padding:2px 5px;border-radius:3px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--g);font-size:9px;outline:none" value="${c.note||''}" data-clnote="${idx}" placeholder="Комментарий...">
        </div>`;
      });
      iB+=`<button class="addb" data-action="addclientapt" data-apt="${apt.id}" style="margin-top:4px;padding:6px;font-size:10px">+ Клиент</button>`;
      h+=secH(`i_${apt.id}`,`💰 Доходы • ${fmt(iT)} (${aptClients.length} гостей)`,G,iB);
      // === EXPENSES ===
      const eT=sa(aE(apt.id,mk));let eB='';EXA.forEach(c=>{eB+=arH(c,'exp',apt.id);});
      eB+=txlH(aE(apt.id,mk).map(t=>({...t,label:EXA.find(c=>c.k===t.cat)?.l||'',note:t.note||''})));
      h+=secH(`e_${apt.id}`,`📉 Расходы • ${fmt(eT)}`,R,eB);
      const p=iT-eT;
      h+=`<div class="pb" style="background:${p>=0?'rgba(74,222,128,.08)':'rgba(248,113,113,.08)'};border:1px solid ${p>=0?'rgba(74,222,128,.2)':'rgba(248,113,113,.2)'}"><span style="font-size:11px;font-weight:700">Прибыль</span><span style="font-size:15px;font-weight:900;color:${p>=0?G:R}">${fmt(p)}</span></div></div>`;
    });

function render(){rTabs();rQ();rC();}

// --- EVENTS ---
document.addEventListener("click",e=>{
  const tb=e.target.closest("[data-tab]");if(tb){tab=tb.dataset.tab;render();return;}
  const tg=e.target.closest("[data-toggle]");if(tg){const id=tg.dataset.toggle;col[id]=!col[id];render();return;}
  const nv=e.target.closest("[data-mnav]");
  if(nv){if(nv.dataset.mnav==='prev'){cM--;if(cM<0){cM=11;cY--;}}else{cM++;if(cM>11){cM=0;cY++;}}render();return;}
  const gm=e.target.closest("[data-gomonth]");
  if(gm){cM=+gm.dataset.gomonth;cY=+gm.dataset.goyear;tab='apts';render();return;}
  const rm=e.target.closest("[data-remove]");if(rm){const id=rm.dataset.remove;data.apartments=data.apartments.filter(a=>a.id!==id);addLog(`Удалена квартира`);cloudSave();render();return;}
  if(e.target.closest("[data-action='addapt']")){data.apartments.push({id:uid(),name:`К${data.apartments.length+1}`});addLog(`Добавлена квартира`);cloudSave();render();return;}
  if(e.target.closest("[data-action='addstaff']")){data.staff.push({id:uid(),name:"",salary:0,bonus:0,transport:0});cloudSave();render();return;}
  if(e.target.closest("[data-action='addcredit']")){data.credits.push({id:uid(),bank:"Новый",amount:0,payment:0,balance:0,holder:"",date:"01"});addLog('Добавлен кредит');cloudSave();render();return;}
  const rms=e.target.closest("[data-rmstaff]");if(rms){data.staff.splice(+rms.dataset.rmstaff,1);addLog(`Удалён сотрудник`);cloudSave();render();return;}
  const rmc=e.target.closest("[data-rmcredit]");if(rmc){const nm=data.credits[+rmc.dataset.rmcredit]?.bank||'';data.credits.splice(+rmc.dataset.rmcredit,1);addLog(`Удалён кредит ${nm}`);cloudSave();render();return;}
  if(e.target.closest("[data-action='addclient']")){if(!data.clients)data.clients=[];data.clients.push({id:uid(),name:"",phone:"",aptId:"",dates:"",note:"",booking:0,payment:0,deposit:0,fine:0,month:cm(),ts:Date.now()});cloudSave();render();return;}
  const acaBtn=e.target.closest("[data-action='addclientapt']");
  if(acaBtn){const aid=acaBtn.dataset.apt;if(!data.clients)data.clients=[];data.clients.push({id:uid(),name:"",phone:"",aptId:aid,dates:"",note:"",booking:0,payment:0,deposit:0,fine:0,month:cm(),ts:Date.now()});addLog(`Новый клиент → ${data.apartments.find(a=>a.id===aid)?.name||''}`);cloudSave();render();return;}
  const rmcl=e.target.closest("[data-rmclient]");if(rmcl){if(!data.clients)data.clients=[];const nm=data.clients[+rmcl.dataset.rmclient]?.name||'';data.clients.splice(+rmcl.dataset.rmclient,1);addLog(`Удалён клиент ${nm}`);cloudSave();render();return;}
  const dl=e.target.closest("[data-del]");
  if(dl){const id=dl.dataset.del;
    data.transactions=data.transactions.filter(t=>t.id!==id);
    ['rafTook','rafRet','karenTook','karenRet'].forEach(k=>{data.partners[k]=data.partners[k].filter(t=>t.id!==id);});
    data.dividends=data.dividends.filter(t=>t.id!==id);
    addLog(`Удалена запись`);cloudSave();render();return;}
  const ab=e.target.closest("[data-add]");
  if(ab){
    const key=ab.dataset.add,aid=ab.dataset.apt||null;
    const row=ab.closest('.ar');const inp=row.querySelector('input[type="number"]');
    const ci=row.querySelector('.cm');const val=Number(inp?.value)||0;if(!val)return;
    const note=(ci?.value||'').trim();const mk2=cm();
    const t={id:uid(),month:mk2,ts:Date.now(),time:ts(),amount:val,note};
    let logMsg='';
    if(key.startsWith('inc_')){t.type='income';t.cat=key.replace('inc_','');t.aptId=aid;data.transactions.push(t);logMsg=`+${val}₽ ${INC.find(c=>c.k===t.cat)?.l||''} ${note}`;}
    else if(key.startsWith('exp_')){t.type='expense';t.cat=key.replace('exp_','');t.aptId=aid;data.transactions.push(t);logMsg=`-${val}₽ ${EXA.find(c=>c.k===t.cat)?.l||''} ${note}`;}
    else if(key.startsWith('mgr_')){t.type='mgr_expense';t.cat=key.replace('mgr_','');data.transactions.push(t);logMsg=`-${val}₽ упр. ${EXM.find(c=>c.k===t.cat)?.l||''} ${note}`;}
    else if(key==='div_amount'){data.dividends.push(t);logMsg=`Дивиденды ${val}₽ ${note}`;}
    else if(key.startsWith('p_')){data.partners[key.replace('p_','')].push(t);logMsg=`${key} ${val}₽ ${note}`;}
    addLog(logMsg);cloudSave();if(inp)inp.value='';if(ci)ci.value='';
    // Partial update - no full render
    rQ();
    const atSpan=row.querySelector('.at');
    if(atSpan){
      if(key.startsWith('inc_'))atSpan.textContent=fmt(gCT('inc',key.replace('inc_',''),aid));
      else if(key.startsWith('exp_'))atSpan.textContent=fmt(gCT('exp',key.replace('exp_',''),aid));
      else if(key.startsWith('mgr_'))atSpan.textContent=fmt(gCT('mgr',key.replace('mgr_',''),aid));
      else if(key==='div_amount')atSpan.textContent=fmt(sa(dM(mk2)));
      else if(key.startsWith('p_')){
        const pk=key.replace('p_','');
        if(pk.includes('Took'))atSpan.textContent=fmt(sa(pM(mk2,pk)));
        else atSpan.textContent=fmt(sa(pM(mk2,pk)));
      }
    }
    // Update section headers for apartments (income from clients now)
    if(aid){
      const ciT=clIncome(aid,mk2)+clDeposit(aid,mk2)+clFine(aid,mk2);
      const iH=document.querySelector(`[data-toggle="i_${aid}"] span`);
      if(iH)iH.textContent=`💰 Доходы • ${fmt(ciT)}`;
      const eH=document.querySelector(`[data-toggle="e_${aid}"] span`);
      if(eH)eH.textContent=`📉 Расходы • ${fmt(sa(aE(aid,mk2)))}`;
    }
    // Update management section header
    const mH=document.querySelector('[data-toggle="mS"] span');
    if(mH)mH.textContent=`🏢 Расходы управления • ${fmt(sa(mE(mk2)))}`;
    // Update dividends section header
    const dH=document.querySelector('[data-toggle="dS"] span');
    if(dH)dH.textContent=`💎 Дивиденды • ${fmt(sa(dM(mk2)))}`;
    // Update partner section headers and balances
    ['raf','karen'].forEach(who=>{
      const nm=who==='raf'?'Раф':'Карен';
      const took2=sa(pM(mk2,who+'Took')),ret2=sa(pM(mk2,who+'Ret')),bal2=took2-ret2;
      const pH=document.querySelector(`[data-toggle="p_${who}"] span`);
      if(pH)pH.textContent=`👤 ${nm} • ${fmt(bal2)}`;
    });
    return;
  }
});
